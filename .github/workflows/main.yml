name: Build Capacitor iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/cli @capacitor/core @capacitor/ios

    - name: Build Web Project (Vite)
      run: npm run build

    - name: Hard Reset and Force iOS Build
      run: |
        rm -rf ios
        npx cap add ios
        npx cap sync ios
        npx capacitor-assets generate --ios --assetPath resources

    - name: Build Unsigned IPA
      run: |
        cd ios/App
        xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
        
        # إنشاء مجلد الـ Payload وضمان نسخ ملف الـ App المدمج
        mkdir -p payload/Payload
        cp -r build/Build/Products/Release-iphoneos/App.app payload/Payload/
        
        # ضغط المجلد في المسار الرئيسي للمشروع كـ IPA
        cd payload
        zip -r ../../../App.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-release
        path: App.ipa
