name: Build Capacitor iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Install Capacitor iOS
      run: npm install @capacitor/ios@8.2.0

    - name: Build Web Project (Vite)
      run: npm run build

    - name: Create or Update Capacitor iOS Folder
      run: |
        npx cap add ios || true
        npx cap sync ios

    - name: Update CocoaPods (Workspace Fix)
      run: |
        cd ios/App
        pod install --repo-update

    - name: Build Unsigned IPA
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
        mkdir -p payload/Payload
        cp -r build/Release-iphoneos/App.app payload/Payload/
        cd payload
        zip -r ../App.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v3
      with:
        name: my-app-release
        path: App.ipa
